version: 2

models:
  - name: dim_customers
    description: "Customer dimension enriched with lifetime order and revenue metrics."
    columns:
      - name: customer_id
        description: "Unique customer identifier."
        data_tests:
          - not_null
          - unique

      - name: email
        description: "Customer email address."
        data_tests:
          - not_null

      - name: lifetime_revenue
        description: "Total net revenue generated by the customer."

      - name: is_repeat_customer
        description: "True if the customer has placed at least two non-cancelled orders."

  - name: dim_products
    description: "Product dimension enriched with sales and profit metrics."
    columns:
      - name: product_id
        description: "Unique product identifier."
        data_tests:
          - not_null
          - unique

      - name: product_name
        description: "Product display name."
        data_tests:
          - not_null

      - name: category
        description: "Product category."

      - name: total_product_revenue
        description: "Total revenue generated by the product."

  - name: fct_orders
    description: "Order-level fact table with revenue, refund, and status metrics."
    columns:
      - name: order_id
        description: "Unique order identifier."
        data_tests:
          - not_null
          - unique

      - name: customer_id
        description: "Customer connected to the order."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customers')
                field: customer_id

      - name: order_status
        description: "Order status."
        data_tests:
          - accepted_values:
              arguments:
                values: ['completed', 'refunded', 'cancelled']

      - name: net_revenue
        description: "Revenue after cancellation and refund logic."

  - name: fct_order_items
    description: "Order-item fact table enriched with product attributes and profit estimates."
    columns:
      - name: order_item_id
        description: "Unique order item identifier."
        data_tests:
          - not_null
          - unique

      - name: order_id
        description: "Order connected to this item."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('fct_orders')
                field: order_id

      - name: product_id
        description: "Product connected to this item."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_products')
                field: product_id

      - name: order_month
        description: "Month of the order. This is not unique because many order items can occur in the same month."

      - name: estimated_gross_profit
        description: "Estimated item-level gross profit."

  - name: mart_monthly_revenue
    description: "Monthly executive KPI table for revenue, orders, refunds, cancellations, and month-over-month growth."
    columns:
      - name: order_month
        description: "Month of the order. One row per month."
        data_tests:
          - not_null
          - unique

      - name: total_orders
        description: "Total number of orders in the month."

      - name: unique_customers
        description: "Number of unique purchasing customers in the month."

      - name: net_revenue
        description: "Total monthly net revenue after refunds and cancellations."

      - name: avg_order_value
        description: "Average net revenue per order."

      - name: refund_order_rate
        description: "Share of monthly orders that were refunded."

      - name: cancellation_rate
        description: "Share of monthly orders that were cancelled."

      - name: month_over_month_growth_rate
        description: "Net revenue growth rate compared with the previous month."

  - name: mart_marketing_channel_performance
    description: "Monthly marketing channel KPI table combining orders, web sessions, and marketing spend."
    columns:
      - name: month
        description: "Month of marketing and order activity."
        data_tests:
          - not_null

      - name: marketing_channel
        description: "Marketing channel such as paid_social, paid_search, organic_search, email, influencer, or direct."
        data_tests:
          - not_null

      - name: net_revenue
        description: "Net revenue attributed to the marketing channel."

      - name: spend_amount
        description: "Marketing spend for the channel and month."

      - name: roas
        description: "Return on ad spend: net_revenue divided by spend_amount."

      - name: cost_per_click
        description: "Marketing cost per click."

      - name: click_through_rate
        description: "Clicks divided by impressions."

      - name: order_conversion_rate
        description: "Orders divided by web sessions."

  - name: mart_customer_lifetime_value
    description: "Customer-level KPI table for lifetime value, repeat purchase behavior, customer segmentation, and acquisition channel quality."
    columns:
      - name: customer_id
        description: "Unique customer identifier."
        data_tests:
          - not_null
          - unique
          - relationships:
              arguments:
                to: ref('dim_customers')
                field: customer_id

      - name: acquisition_channel
        description: "Marketing channel that originally acquired the customer."

      - name: total_orders
        description: "Total non-cancelled orders placed by the customer."

      - name: lifetime_value
        description: "Total net revenue generated by the customer."

      - name: average_order_value
        description: "Average net revenue per order for the customer."

      - name: repeat_orders
        description: "Number of non-first orders placed by the customer."

      - name: customer_segment
        description: "Customer segment based on purchase frequency."
        data_tests:
          - accepted_values:
              arguments:
                values: ['no_purchase', 'one_time_customer', 'repeat_customer', 'loyal_customer']

      - name: is_repeat_customer
        description: "True if the customer has at least two non-cancelled orders."