name: Scheduled dbt Build

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

jobs:
  dbt-build:
    runs-on: ubuntu-latest

    env:
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_PRIVATE_KEY_PASSPHRASE: ${{ secrets.SNOWFLAKE_PRIVATE_KEY_PASSPHRASE }}
      SNOWFLAKE_PRIVATE_KEY_PATH: /home/runner/.dbt/keys/rsa_key.p8
      SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
      SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
      SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
      SNOWFLAKE_SCHEMA: ${{ secrets.SNOWFLAKE_SCHEMA }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dbt
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install "dbt-core==1.11.11" "dbt-snowflake==1.11.6"

      - name: Write Snowflake private key
        run: |
          mkdir -p /home/runner/.dbt/keys
          printf "%s" "${{ secrets.SNOWFLAKE_PRIVATE_KEY }}" > /home/runner/.dbt/keys/rsa_key.p8
          chmod 600 /home/runner/.dbt/keys/rsa_key.p8

      - name: Check dbt connection
        run: dbt debug --profiles-dir ci

      - name: Build dbt project
        run: dbt build --profiles-dir ci

      - name: Generate dbt docs
        run: dbt docs generate --profiles-dir ci